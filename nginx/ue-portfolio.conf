# UE Portfolio static site fragment.
# Include this file inside the 1Panel-managed HTTPS server block.
# TLS certificates, domains, and the HTTP to HTTPS redirect are managed by 1Panel;
# this file intentionally contains no certificate paths, domains, or secrets.

root /var/www/ue-portfolio/current;
index index.html;

server_tokens off;
autoindex off;

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  application/javascript
  application/json
  application/xml
  image/svg+xml;

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Root request enters the fixed /UE/ base path, preserving the query string.
location = / {
  return 302 /UE/$is_args$args;
}

# Hashed build assets (JS, CSS, woff2, build images): long-lived immutable cache.
# No SPA fallback here; a missing hashed asset is a real 404.
location /UE/assets/ {
  try_files $uri =404;
  expires 1y;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# Media files: 30-day cache with byte-range streaming for video and GLB.
# No SPA fallback here; a missing media file is a real 404.
location ~* ^/UE/.+\.(?:mp4|webm|ogg|mov|m4v|glb|gltf)$ {
  try_files $uri =404;
  expires 30d;
  add_header Cache-Control "public, max-age=2592000" always;
  add_header Accept-Ranges "bytes" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# SPA entry point: always uncached.
location = /UE/ {
  try_files $uri $uri/ =404;
  expires -1;
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

location = /UE/index.html {
  try_files $uri =404;
  expires -1;
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# Client routes: serve real files first, otherwise hand off to the SPA fallback.
location /UE/ {
  try_files $uri $uri/ @ue_spa;
}

# SPA fallback returns the app shell with HTML cache disabled.
location @ue_spa {
  rewrite ^ /UE/index.html break;
  expires -1;
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
