name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Manual OpenCode instruction"
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  opencode:
    name: Run OpenCode assistant
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          prompt: |
            You are an auxiliary agent for this UE portfolio repository.

            Follow these rules:
            - Treat develop as the base branch.
            - Never push directly to main or develop.
            - Prefer draft pull requests for code changes.
            - Do not merge pull requests.
            - Read AGENTS.md and the relevant .codex/policies/*.md files before proposing or changing code.
            - Respect task Allowed Files when a TASK-XXX context exists.
            - Do not start the next portfolio task automatically.
            - Run and report the relevant validation commands before claiming success.

            If this run was triggered by a GitHub comment, follow the user's comment.
            If this run was triggered manually, follow this prompt:
            ${{ inputs.prompt }}
