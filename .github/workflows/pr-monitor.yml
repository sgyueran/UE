name: pr-monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, review_requested]
  pull_request_review:
    types: [submitted, edited, dismissed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write
  statuses: read
  checks: read

concurrency:
  group: pr-monitor-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    name: Summarize pull request state
    runs-on: ubuntu-latest
    steps:
      - name: Update PR monitor comments
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- opencode-pr-monitor -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function listOpenPullRequests() {
              if (context.payload.pull_request) {
                return [context.payload.pull_request];
              }

              return github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                per_page: 100
              });
            }

            async function latestChecksFor(ref) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100
              });
              return data.check_runs;
            }

            async function latestStatusFor(ref) {
              const { data } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref
              });
              return data;
            }

            async function reviewSummary(number) {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: number,
                per_page: 100
              });

              const latestByUser = new Map();
              for (const review of reviews) {
                if (!review.user || review.state === "COMMENTED") continue;
                latestByUser.set(review.user.login, review.state);
              }

              const requestedChanges = [...latestByUser.entries()]
                .filter(([, state]) => state === "CHANGES_REQUESTED")
                .map(([login]) => login);

              const approvals = [...latestByUser.entries()]
                .filter(([, state]) => state === "APPROVED")
                .map(([login]) => login);

              return { requestedChanges, approvals };
            }

            function checkSummary(checkRuns, combinedStatus) {
              const failedChecks = checkRuns.filter((run) =>
                ["failure", "timed_out", "cancelled", "action_required"].includes(run.conclusion)
              );
              const pendingChecks = checkRuns.filter((run) =>
                run.status !== "completed" || run.conclusion === null
              );

              const failedStatuses = combinedStatus.statuses.filter((status) =>
                ["failure", "error"].includes(status.state)
              );
              const pendingStatuses = combinedStatus.statuses.filter((status) =>
                status.state === "pending"
              );

              return { failedChecks, pendingChecks, failedStatuses, pendingStatuses };
            }

            async function upsertComment(number, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: number,
                per_page: 100
              });

              const previous = comments.find((comment) => comment.body?.includes(marker));
              if (previous) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: previous.id,
                  body
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: number,
                body
              });
            }

            const pulls = await listOpenPullRequests();

            for (const pull of pulls) {
              const checks = await latestChecksFor(pull.head.sha);
              const statuses = await latestStatusFor(pull.head.sha);
              const reviews = await reviewSummary(pull.number);
              const summary = checkSummary(checks, statuses);

              const actionItems = [];
              if (pull.draft) actionItems.push("Draft PR: keep review expectations light until ready.");
              if (summary.failedChecks.length > 0) {
                actionItems.push(`Failed checks: ${summary.failedChecks.map((run) => run.name).join(", ")}.`);
              }
              if (summary.failedStatuses.length > 0) {
                actionItems.push(`Failed statuses: ${summary.failedStatuses.map((status) => status.context).join(", ")}.`);
              }
              if (reviews.requestedChanges.length > 0) {
                actionItems.push(`Changes requested by: ${reviews.requestedChanges.join(", ")}.`);
              }
              if (summary.pendingChecks.length > 0 || summary.pendingStatuses.length > 0) {
                actionItems.push("Some checks are still pending.");
              }
              if (actionItems.length === 0) {
                actionItems.push("No monitor-blocking issue detected.");
              }

              const body = `${marker}
            ## OpenCode PR Monitor

            - Base: \`${pull.base.ref}\`
            - Head: \`${pull.head.ref}\`
            - Draft: ${pull.draft ? "yes" : "no"}
            - Approvals: ${reviews.approvals.length > 0 ? reviews.approvals.join(", ") : "none"}
            - Requested changes: ${reviews.requestedChanges.length > 0 ? reviews.requestedChanges.join(", ") : "none"}
            - Check runs: ${checks.length}
            - Commit statuses: ${statuses.statuses.length}

            Action items:
            ${actionItems.map((item) => `- ${item}`).join("\n")}

            To ask OpenCode for help, comment with \`/opencode\` or \`/oc\` and a specific instruction.`;

              await upsertComment(pull.number, body);
            }
