name: ci

on:
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - ".codex/**"
  push:
    branches:
      - develop
      - main
      - "codex/**"
    paths-ignore:
      - ".codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate blueprint
        run: python scripts/validate-blueprint.py

      - name: Validate skills
        run: python scripts/validate-skills.py

      - name: Validate sprints
        run: python scripts/validate-sprints.py

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and component tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Publication safety
        run: npm run validate:publication

      - name: Whitespace check
        run: git diff --check

  browser:
    name: Browser and visual checks
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Build
        run: npm run build

      - name: Diagnose font environment
        shell: pwsh
        continue-on-error: true
        run: |
          node --version
          npx playwright --version
          [System.Environment]::OSVersion | Out-String
          try {
            $os = Get-CimInstance Win32_OperatingSystem
            "OS Caption: $($os.Caption) Version $($os.Version) Build $($os.BuildNumber)"
          } catch {
            "OS caption unavailable: $($_.Exception.Message)"
          }
          try {
            $dpi = (Get-ItemProperty -Path "HKCU:\Control Panel\Desktop\WindowMetrics" -Name AppliedDPI -ErrorAction Stop).AppliedDPI
            "AppliedDPI: $dpi"
          } catch {
            "AppliedDPI: unavailable"
          }
          $watch = @("arial","segoe","helvetica","inter","roboto","consolas","courier","cascadia","system-ui","tahoma","verdana")
          $fontProps = (Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Fonts").PSObject.Properties
          "Matched system fonts:"
          foreach ($prop in $fontProps) {
            $lower = $prop.Name.ToLower()
            if ($watch | Where-Object { $lower.Contains($_) }) {
              "  $($prop.Name) => $($prop.Value)"
            }
          }
          $script = @'
          import { spawn } from "node:child_process";
          import { chromium } from "@playwright/test";

          const base = "http://127.0.0.1:4173/UE/";
          const routes = ["", "projects", "about", "definitely-not-a-real-route"];

          async function waitForServer(timeoutMs) {
            const start = Date.now();
            for (;;) {
              try {
                const response = await fetch(base);
                if (response.status > 0) {
                  return;
                }
              } catch {
                void 0;
              }
              if (Date.now() - start > timeoutMs) {
                throw new Error("preview server timeout");
              }
              await new Promise((resolve) => setTimeout(resolve, 500));
            }
          }

          async function main() {
            const preview = spawn("npm", ["run", "preview", "--", "--host", "127.0.0.1", "--port", "4173"], {
              stdio: "pipe",
              shell: true,
            });
            await waitForServer(60000);
            const browser = await chromium.launch({ headless: true });
            console.log("Chromium version:", browser.version());
            const page = await browser.newPage();
            const results = {};

            for (const route of routes) {
              await page.goto(base + route, { waitUntil: "networkidle" });
              results[route === "" ? "/" : `/${route}`] = await page.evaluate(() => {
                const pick = (element) => {
                  if (!element) {
                    return null;
                  }
                  const styles = getComputedStyle(element);
                  const rect = element.getBoundingClientRect();
                  return {
                    fontFamily: styles.fontFamily,
                    fontSize: styles.fontSize,
                    fontWeight: styles.fontWeight,
                    lineHeight: styles.lineHeight,
                    letterSpacing: styles.letterSpacing,
                    rect: { x: rect.x, y: rect.y, width: rect.width, height: rect.height },
                  };
                };
                const fontFaces = [];
                document.fonts.forEach((face) => {
                  fontFaces.push({ family: face.family, style: face.style, weight: face.weight, status: face.status });
                });
                const primary = getComputedStyle(document.body).fontFamily.split(",")[0].replace(/["']/g, "").trim();
                return {
                  url: window.location.pathname,
                  devicePixelRatio: window.devicePixelRatio,
                  userAgent: navigator.userAgent,
                  platform: navigator.platform,
                  primaryFamily: primary,
                  body: pick(document.body),
                  h1: pick(document.querySelector("h1")),
                  navLink: pick(document.querySelector("nav a")),
                  paragraph: pick(document.querySelector("main p")),
                  button: pick(document.querySelector("main button, header button")),
                  fontsStatus: document.fonts.status,
                  fontFaces,
                  checkPrimary: document.fonts.check(`16px "${primary}"`),
                  checkSegoeUI: document.fonts.check('16px "Segoe UI"'),
                  checkArial: document.fonts.check('16px "Arial"'),
                  checkSystemUI: document.fonts.check("16px system-ui"),
                };
              });
            }

            await page.goto(base, { waitUntil: "networkidle" });
            results.__glyphProbe = await page.evaluate(() => {
              const strings = [
                "UE5 Engineer",
                "Verified project index",
                "About",
                "Projects",
                "Page not found",
                "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789",
              ];
              const primary = getComputedStyle(document.body).fontFamily;
              const families = [primary, "Arial", "Segoe UI", "sans-serif", "system-ui"];
              const host = document.createElement("div");
              host.style.cssText = "position:absolute;left:-10000px;top:0;visibility:hidden;";
              document.body.appendChild(host);
              const output = {};
              for (const family of families) {
                output[family] = {};
                for (const text of strings) {
                  const element = document.createElement("span");
                  element.textContent = text;
                  element.style.cssText = `font-family:${family};font-size:16px;font-weight:400;line-height:24px;letter-spacing:normal;white-space:nowrap;`;
                  host.appendChild(element);
                  output[family][text] = { width: element.offsetWidth, height: element.offsetHeight };
                  element.remove();
                }
              }
              host.remove();
              return { primary, output };
            });

            console.log("FONT-DIAGNOSTIC-JSON-BEGIN");
            console.log(JSON.stringify(results, null, 2));
            console.log("FONT-DIAGNOSTIC-JSON-END");
            await browser.close();
            preview.kill("SIGTERM");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          '@
          Set-Content -LiteralPath "$env:GITHUB_WORKSPACE\font-diagnostic.tmp.mjs" -Value $script -Encoding utf8
          try {
            node "$env:GITHUB_WORKSPACE\font-diagnostic.tmp.mjs"
          } finally {
            Remove-Item -LiteralPath "$env:GITHUB_WORKSPACE\font-diagnostic.tmp.mjs" -Force -ErrorAction SilentlyContinue
          }

      - name: Playwright end-to-end tests
        id: playwright
        run: npm run test:e2e

      - name: Accessibility audit
        id: accessibility
        if: always()
        run: node scripts/accessibility-audit.mjs

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-artifacts-${{ runner.os }}-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
            docs/architecture/accessibility-audit-after.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Aggregate browser check results
        if: always()
        shell: pwsh
        run: |
          $playwrightOutcome = "${{ steps.playwright.outcome }}"
          $accessibilityOutcome = "${{ steps.accessibility.outcome }}"
          "playwright outcome: $playwrightOutcome"
          "accessibility outcome: $accessibilityOutcome"
          if ($playwrightOutcome -ne "success" -or $accessibilityOutcome -ne "success") {
            Write-Error "Browser checks failed (playwright=$playwrightOutcome, accessibility=$accessibilityOutcome)"
            exit 1
          }
