version = 1
name = "UE-Portfolio"

[setup]
script = '''
set -e

echo "=== Environment Check ==="

python --version || true
python3 --version || true
node --version
npm --version

echo "=== Install Dependencies ==="

if [ -f package-lock.json ]; then
    npm ci
elif [ -f package.json ]; then
    npm install
fi

echo "=== Blueprint Validation ==="

if [ -f scripts/validate-blueprint.py ]; then
    python scripts/validate-blueprint.py || python3 scripts/validate-blueprint.py
fi

if [ -f scripts/validate-skills.py ]; then
    python scripts/validate-skills.py || python3 scripts/validate-skills.py
fi

echo "=== Setup Complete ==="'''

[cleanup]
script = "echo \"Cleanup Complete\""
